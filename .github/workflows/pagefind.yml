name: Build and Deploy Pagefind
on:
  push:
    branches: [ main ] # Runs every time you push to the main branch

jobs:
  build-search:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Pagefind
        # This command tells Pagefind: "Look at the current folder (.), 
        # find all HTML files, and put the search index in a folder called 'pagefind'"
        run: npx pagefind --site . --output-path "pagefind"

      - name: Deploy to GitHub Pages
        # This keeps your search index in sync with your live site
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # Deploys the entire root (including the new /pagefind folder)
          branch: gh-pages # Or whichever branch you use for hosting
